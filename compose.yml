services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${SB_POSTGRES_DB:-solangebernard}
      POSTGRES_PASSWORD: ${SB_POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: ${SB_POSTGRES_USER:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${SB_POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
